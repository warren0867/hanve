<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한베 · HanVe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f9f9f7;--bg3:#f3f2ee;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e9a;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --primary:#f97316;--primary-bg:#fff7ed;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --red:#a32d2d;--red-bg:#fcebeb;
  --amber:#854f0b;--amber-bg:#faeeda;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --r:10px;--rl:16px;--rxl:20px;
  --me:#f97316;--other:#f3f2ee;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--bg2:#222220;--bg3:#2a2a28;
  --text:#f3f2ee;--text2:#9e9e9a;--text3:#6b6b67;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --primary-bg:#431407;--other:#2a2a28;--purple-bg:#26215C;
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Pretendard',sans-serif;font-size:14px;background:var(--bg3);color:var(--text);display:flex;flex-direction:column}
/* 헤더 */
.app-header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:17px;font-weight:700;color:var(--primary)}
.logo small{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px}
.ibtn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:8px;font-size:18px;line-height:1}
.ibtn:hover{background:var(--bg3)}
/* 탭 */
.tab-bar{background:var(--bg);border-top:0.5px solid var(--border);display:flex;flex-shrink:0}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;transition:color .15s}
.ti.active{color:var(--primary)}
.ticon{font-size:19px;line-height:1}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}
/* 공통 버튼 */
.btn{padding:8px 16px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s}
.btn:hover{background:var(--bg3)}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.btn-p:hover{opacity:.85}
/* 홈 */
.hscroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.hcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.hct{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.tw-kr{font-size:26px;font-weight:700;text-align:center;margin-bottom:4px}
.tw-vn{font-size:18px;color:var(--primary);text-align:center;margin-bottom:3px}
.tw-pron{font-size:13px;color:var(--blue);font-family:monospace;text-align:center;margin-bottom:3px}
.tw-mean{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.tw-acts{display:flex;gap:8px;justify-content:center}
.tts-btn{padding:7px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.tts-btn:hover{background:var(--primary-bg);color:var(--primary);border-color:var(--primary)}
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pg-item{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.pg-cat{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px}
.pg-bw{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:4px}
.pg-bf{height:100%;background:var(--primary);border-radius:3px;transition:width .5s}
.pg-n{font-size:10px;color:var(--text3)}
.ph-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.ph-row:last-child{border-bottom:none;padding-bottom:0}
.ph-kr{font-size:13px;font-weight:500}.ph-vn{font-size:12px;color:var(--primary);margin-top:1px}
.phtts{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px}
.phtts:hover{color:var(--primary)}
/* 채팅 */
.chatmsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.mg{display:flex;flex-direction:column;gap:3px}
.mg.me{align-items:flex-end}.mg.other{align-items:flex-start}
.msender{font-size:11px;color:var(--text3);padding:0 4px}
.mrow{display:flex;align-items:flex-end;gap:6px}
.mg.me .mrow{flex-direction:row-reverse}
.bub{max-width:72%;padding:9px 13px;border-radius:var(--rxl);font-size:14px;line-height:1.5;word-break:break-word}
.mg.me .bub{background:var(--me);color:#fff;border-bottom-right-radius:6px}
.mg.other .bub{background:var(--other);color:var(--text);border-bottom-left-radius:6px}
.mtime{font-size:10px;color:var(--text3);white-space:nowrap;margin-bottom:2px}
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.rpill{font-size:13px;padding:2px 7px;border-radius:20px;background:var(--bg2);border:0.5px solid var(--border2);cursor:pointer;user-select:none;transition:all .15s}
.rpill:hover{transform:scale(1.1)}.rpill.on{background:var(--primary-bg);border-color:var(--primary)}
.epicker{display:flex;gap:4px;background:var(--bg);border:0.5px solid var(--border2);padding:5px 7px;border-radius:var(--rl);width:fit-content}
.eopt{font-size:17px;cursor:pointer;padding:3px;border-radius:6px}.eopt:hover{background:var(--bg2)}
.macts{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mab{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.mab:hover{background:var(--primary-bg);color:var(--primary);border-color:var(--primary)}
.mab.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.tbub{margin-top:4px;font-size:12px;color:var(--blue);background:var(--blue-bg);padding:7px 11px;border-radius:10px;border-left:2px solid var(--blue);line-height:1.5}
.chatia{background:var(--bg);border-top:0.5px solid var(--border);padding:8px 12px;flex-shrink:0}
.whorow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.wchip{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-weight:500;transition:all .15s}
.wchip.active{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.chatrow{display:flex;gap:8px;align-items:flex-end}
.chatinp{flex:1;font-size:14px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:22px;background:var(--bg2);color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color .15s}
.chatinp:focus{border-color:var(--primary);background:var(--bg)}
.sendbtn{width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sendbtn:hover{opacity:.85}
/* 단어장 */
.wtbar{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.wsw{flex:1;min-width:140px;position:relative}
.wsinp{width:100%;font-size:13px;padding:8px 30px 8px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none}
.wsinp:focus{border-color:var(--primary)}
.wsclr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;display:none}
.wfsel{font-size:12px;padding:7px 8px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;cursor:pointer}
.awbtn{font-size:12px;padding:7px 12px;border-radius:var(--r);border:none;background:var(--primary);color:#fff;cursor:pointer;font-weight:600;white-space:nowrap}
.wstats{font-size:12px;color:var(--text3);padding:6px 12px 2px}
.wlist{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.wcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:11px 13px;display:flex;align-items:center;gap:10px}
.wcc{flex:1;min-width:0}
.wkr{font-size:14px;font-weight:600}
.wvn{font-size:13px;color:var(--primary);margin-top:2px}
.wpron{font-size:11px;color:var(--blue);font-family:monospace;margin-top:1px}
.wmean{font-size:11px;color:var(--text3);margin-top:1px}
.wcat{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;background:var(--primary-bg);color:var(--primary);font-weight:500;margin-top:3px}
.wwrong{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;background:var(--red-bg);color:var(--red);font-weight:500;margin-top:3px;margin-left:3px}
.wbw{display:flex;gap:4px;flex-shrink:0;align-items:center}
.wb{background:none;border:none;cursor:pointer;font-size:15px;padding:4px;border-radius:6px;color:var(--text3)}
.wb:hover{background:var(--bg2)}
.sdd{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:240px;overflow-y:auto;display:none;margin-top:2px}
.sdd.open{display:block}
.sdd-item{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sdd-item:hover{background:var(--bg2)}
.sdkr{font-weight:600}.sdvn{color:var(--primary)}
.sdadd{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--primary-bg);color:var(--primary);border:0.5px solid var(--primary);cursor:pointer}
/* 퀴즈 */
.qwrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:1rem;gap:.75rem;overflow-y:auto}
.qmgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.qmc{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rl);padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s}
.qmc:hover,.qmc.active{border-color:var(--primary);background:var(--primary-bg)}
.qmci{font-size:28px;margin-bottom:6px}
.qmcn{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.qmcd{font-size:11px;color:var(--text3);line-height:1.4}
.qstbtn{width:100%;max-width:420px;padding:14px;border-radius:var(--rl);background:var(--primary);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer}
.qstbtn:hover{opacity:.85}
/* 공통 퀴즈 헤더 */
.qtop{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between}
.qpb{width:100%;max-width:420px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qpbf{height:100%;background:var(--primary);border-radius:3px;transition:width .4s}
/* 4지선다 */
.mcqq{width:100%;max-width:420px;background:var(--bg);border-radius:var(--rxl);padding:1.5rem;text-align:center;border:0.5px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05)}
.mcqqw{font-size:24px;font-weight:700;margin-bottom:6px}
.mcqqp{font-size:12px;color:var(--blue);font-family:monospace}
.mcqcs{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.mcqb{padding:14px 10px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.mcqb:hover{border-color:var(--primary);background:var(--primary-bg)}
.mcqb.cor{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.mcqb.wro{border-color:var(--red);background:var(--red-bg);color:var(--red)}
/* 스피드 */
.sptw{width:100%;max-width:420px;display:flex;align-items:center;gap:10px}
.sptb{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sptbf{height:100%;background:var(--primary);border-radius:4px;transition:width .1s linear}
.sptxt{font-size:14px;font-weight:700;color:var(--primary);min-width:28px;text-align:right}
.spq{width:100%;max-width:420px;background:var(--bg);border-radius:var(--rxl);padding:1.5rem;text-align:center;border:0.5px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05)}
.spcs{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.spb{padding:12px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.spb:hover{border-color:var(--primary);background:var(--primary-bg)}
.spb.hit{border-color:var(--green);background:var(--green-bg);color:var(--green);transform:scale(1.03)}
.spb.mis{border-color:var(--red);background:var(--red-bg);color:var(--red)}
/* 매칭 게임 */
.mgame{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.mgcol-t{font-size:11px;font-weight:600;color:var(--text3);text-align:center;margin-bottom:4px}
.mgi{padding:11px 8px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;min-height:46px;display:flex;align-items:center;justify-content:center}
.mgi:hover{border-color:var(--primary);background:var(--primary-bg)}
.mgi.sel{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.mgi.done{border-color:var(--green);background:var(--green-bg);color:var(--green);cursor:default}
.mgi.bad{border-color:var(--red);background:var(--red-bg);animation:shk .3s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
/* 듣고 맞추기 */
.listenq{width:100%;max-width:420px;background:var(--bg);border-radius:var(--rxl);padding:2rem;text-align:center;border:0.5px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05);display:flex;flex-direction:column;align-items:center;gap:12px}
.listen-btn{width:80px;height:80px;border-radius:50%;background:var(--primary-bg);border:2px solid var(--primary);color:var(--primary);font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.listen-btn:hover{background:var(--primary);color:#fff;transform:scale(1.05)}
.listen-btn.playing{background:var(--primary);color:#fff;animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.listen-hint{font-size:13px;color:var(--text3)}
.listen-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.lcb{padding:13px 10px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.lcb:hover{border-color:var(--primary);background:var(--primary-bg)}
.lcb.cor{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.lcb.wro{border-color:var(--red);background:var(--red-bg);color:var(--red)}
/* 빈칸 채우기 */
.fillq{width:100%;max-width:420px;background:var(--bg);border-radius:var(--rxl);padding:1.5rem;text-align:center;border:0.5px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05)}
.fill-kr{font-size:22px;font-weight:700;margin-bottom:8px}
.fill-vn{font-size:16px;color:var(--text2);line-height:2;letter-spacing:2px;margin-bottom:6px}
.fill-hint{font-size:11px;color:var(--text3);margin-bottom:10px}
.fill-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.fcb{padding:13px 10px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;font-family:monospace}
.fcb:hover{border-color:var(--purple);background:var(--purple-bg)}
.fcb.cor{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.fcb.wro{border-color:var(--red);background:var(--red-bg);color:var(--red)}
/* 결과 */
.qres{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1rem}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.res-btn{padding:11px 20px;border-radius:var(--rl);border:none;font-size:14px;font-weight:600;cursor:pointer}
.wrl{width:100%;max-width:420px}
.wrl-t{font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px}
.wrl-i{background:var(--red-bg);border-radius:var(--r);padding:8px 12px;margin-bottom:5px;font-size:13px}
/* 즐겨찾기 */
.phtbar{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.phsrch{flex:1;font-size:13px;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none}
.phsrch:focus{border-color:var(--primary)}
.aphbtn{font-size:12px;padding:7px 12px;border-radius:var(--r);border:none;background:var(--purple);color:#fff;cursor:pointer;font-weight:600}
.phlist{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.phcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px 14px}
.phkr{font-size:14px;font-weight:600;margin-bottom:3px}
.phvn{font-size:13px;color:var(--primary);margin-bottom:6px}
.phacts{display:flex;gap:6px;align-items:center}
.phcat{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--purple-bg);color:var(--purple);font-weight:500}
.phdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px;margin-left:auto;border-radius:6px}
.phdel:hover{color:var(--red);background:var(--red-bg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:13px}
/* 문법 */
.gr-toolbar{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.gr-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.gr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.gr-title{font-size:16px;font-weight:700;color:var(--purple)}
.gr-lv{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple);font-weight:600;flex-shrink:0;margin-top:2px}
.gr-meaning{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.6}
.gr-vn{font-size:12px;color:var(--blue);background:var(--blue-bg);padding:6px 10px;border-radius:var(--r);margin-bottom:10px;line-height:1.6}
.gr-ex-title{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.gr-ex{background:var(--bg2);border-radius:var(--r);padding:8px 12px;margin-bottom:6px}
.gr-ex-kr{font-size:13px;font-weight:500;margin-bottom:2px}
.gr-ex-vn{font-size:12px;color:var(--primary);margin-bottom:1px}
.gr-ex-pron{font-size:11px;color:var(--blue);font-family:monospace}
.grq-card{width:100%;max-width:420px;background:var(--bg);border-radius:var(--rxl);padding:1.5rem;border:0.5px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05)}
.grq-q{font-size:15px;line-height:1.8;margin-bottom:4px;font-weight:500}
.grq-ctx{font-size:11px;color:var(--text3);margin-bottom:12px}
.grq-choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px}
.grcb{padding:12px 16px;border-radius:var(--rl);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left}
.grcb:hover{border-color:var(--purple);background:var(--purple-bg);color:var(--purple)}
.grcb.cor{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.grcb.wro{border-color:var(--red);background:var(--red-bg);color:var(--red)}
/* 모달 */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sh{background:var(--bg);border-radius:var(--rxl) var(--rxl) 0 0;padding:1.5rem;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.sh-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem}
.sh h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.fl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.fi,.fsel,.fta{width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s;margin-bottom:12px}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--primary);background:var(--bg)}
.fta{resize:vertical;min-height:60px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.f2 .fi{margin-bottom:0}
.shbtns{display:flex;gap:8px;margin-top:1rem}
.shcancel{flex:1;padding:12px;border-radius:var(--rl);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px}
.shsave{flex:2;padding:12px;border-radius:var(--rl);border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.shcancel:hover{background:var(--bg3)}.shsave:hover{opacity:.85}
</style>
</head>

<div class="app-header">
  <div class="logo">한베 <small>HanVe</small></div>
  <div style="display:flex;gap:4px">
    <button class="ibtn" onclick="openNick()">👤</button>
    <button class="ibtn" onclick="openAddWord()">＋</button>
  </div>
</div>

<!-- 홈 -->
<div class="page active" id="page-home">
  <div class="hscroll">
    <div class="hcard"><div class="hct">✨ 오늘의 단어</div><div id="todayWord"></div></div>
    <div class="hcard"><div class="hct">📊 카테고리별 학습 진도</div><div class="pg-grid" id="pgGrid"></div></div>
    <div class="hcard">
      <div class="hct">⭐ 즐겨찾기 문장</div>
      <div id="phPrev"></div>
      <button onclick="showPage('phrases',document.querySelectorAll('.ti')[4])" style="width:100%;margin-top:10px;padding:8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:12px">전체 보기 →</button>
    </div>
  </div>
</div>

<!-- 채팅 -->
<div class="page" id="page-chat">
  <div class="chatmsgs" id="chatMsgs"></div>
  <div class="chatia">
    <div class="whorow">
      <span style="font-size:11px;color:var(--text3)">보내는 사람:</span>
      <button class="wchip active" id="chip-me" onclick="setWho('me')">나</button>
      <button class="wchip" id="chip-other" onclick="setWho('other')">상대방</button>
    </div>
    <div class="chatrow">
      <textarea class="chatinp" id="chatInput" placeholder="메시지 입력..." rows="1" onkeydown="chatKey(event)" onkeyup="chatKeyUp(event)" oninput="autoH(this)"></textarea>
      <button class="sendbtn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- 단어장 -->
<div class="page" id="page-words">
  <div class="wtbar">
    <div class="wsw">
      <input class="wsinp" type="text" id="wordSearch" placeholder="검색 또는 번역..." oninput="onSI()" autocomplete="off">
      <button class="wsclr" id="wsclr" onclick="clrSearch()">✕</button>
      <div class="sdd" id="sdd"></div>
    </div>
    <select class="wfsel" id="catF" onchange="renderWords()"><option value="">전체</option></select>
    <button class="awbtn" onclick="openAddWord()">+ 추가</button>
  </div>
  <div class="wstats" id="wstats"></div>
  <div class="wlist" id="wlist"></div>
</div>

<!-- 퀴즈 -->
<div class="page" id="page-quiz">
  <div class="qwrap" id="qwrap"></div>
</div>

<!-- 즐겨찾기 -->
<div class="page" id="page-phrases">
  <div class="phtbar">
    <input class="phsrch" type="text" id="phSrch" placeholder="문장 검색..." oninput="renderPhrases()">
    <button class="aphbtn" onclick="openAddPhrase()">+ 문장 추가</button>
  </div>
  <div class="phlist" id="phList"></div>
</div>

<!-- 문법 -->
<div class="page" id="page-grammar">
  <div class="gr-toolbar">
    <select class="wfsel" id="grLvFilter" onchange="renderGrammar()">

      <option value="2급">2급</option>
      <option value="3급">3급</option>

  </div>
  <div class="wstats" id="grStats"></div>
  <div class="wlist" id="grList"></div>
</div>

<!-- 탭바 -->
<div class="tab-bar">
  <button class="ti active" onclick="showPage('home',this)"><div class="ticon">🏠</div>홈</button>
  <button class="ti" onclick="showPage('chat',this)"><div class="ticon">💬</div>채팅</button>

  <button class="ti" onclick="showPage('quiz',this)"><div class="ticon">🎯</div>퀴즈</button>
  <button class="ti" onclick="showPage('phrases',this)"><div class="ticon">⭐</div>문장</button>
  <button class="ti" onclick="showPage('grammar',this)"><div class="ticon">📝</div>문법</button>
</div>

<!-- 닉네임 -->
<div class="ov" id="ov-nick"><div class="sh"><div class="sh-handle"></div><h3>닉네임 설정</h3>

</div></div>

<!-- 단어 추가 -->

function speak(text,lang){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
  return u;
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ti').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='words'){buildCat();renderWords();}
  if(id==='quiz'){qSession++;clrSpTimer();window._ls=null;window._sp=null;window._mc=null;initQuiz();}
  if(id==='chat') scrollBot();
  if(id==='home') renderHome();
  if(id==='phrases') renderPhrases();
  if(id==='grammar') renderGrammar();
}

function renderHome(){
  const w=words[Math.floor(Date.now()/86400000)%words.length];
  document.getElementById('todayWord').innerHTML=`
    <div class="tw-kr">${esc(w.kr)}</div>
    <div class="tw-vn">${esc(w.vn)}</div>
    <div class="tw-pron">[ ${esc(w.pron||'—')} ]</div>
    ${w.mean?`<div class="tw-mean">${esc(w.mean)}</div>`:''}
    <div class="tw-acts">
      <button class="tts-btn" onclick="speak('${esq(w.kr)}','ko-KR')">🔊 한국어</button>
      <button class="tts-btn" onclick="speak('${esq(w.vn)}','vi-VN')">🔊 베트남어</button>
    </div>`;
  const cats=[...new Set(words.map(x=>x.cat))];
  document.getElementById('pgGrid').innerHTML=cats.map(cat=>{
    const cw=words.filter(x=>x.cat===cat);
    const ln=cw.filter(x=>stats[x.id]&&stats[x.id].correct>0).length;
    const pct=Math.round(ln/cw.length*100);
    return `<div class="pg-item"><div class="pg-cat">${cat}</div>
      <div class="pg-bw"><div class="pg-bf" style="width:${pct}%"></div></div>
      <div class="pg-n">${ln}/${cw.length}개 · ${pct}%</div></div>`;
  }).join('');
  const prev=phrases.slice(0,3);
  document.getElementById('phPrev').innerHTML=prev.length
    ?prev.map(p=>`<div class="ph-row"><div style="flex:1"><div class="ph-kr">${esc(p.kr)}</div><div class="ph-vn">${esc(p.vn)}</div></div><button class="phtts" onclick="speak('${esq(p.kr)}','ko-KR')">🔊</button></div>`).join('')
    :'<div style="text-align:center;color:var(--text3);font-size:13px;padding:1rem">즐겨찾기 문장이 없어요</div>';
}

function setWho(w){
  who=w;
  document.getElementById('chip-me').classList.toggle('active',w==='me');
  document.getElementById('chip-other').classList.toggle('active',w==='other');
  document.getElementById('chip-me').textContent=nicks.me;
  document.getElementById('chip-other').textContent=nicks.other;
}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing)e.preventDefault();}
function chatKeyUp(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing)sendMsg();}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();if(!text)return;
  msgs.push({id:nid(),who,text,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),trans:null,reactions:{}});
  sc();inp.value='';inp.style.height='auto';renderMsgs();scrollBot();
}
async function translateMsg(id){
  const m=msgs.find(x=>x.id===id);if(!m)return;
  if(m.trans){m.trans=null;sc();renderMsgs();return;}
  m.trans='__loading__';sc();renderMsgs();
  try{
    const hasKr=/[가-힣]/.test(m.text);
    const res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${hasKr?'ko':'vi'}&tl=${hasKr?'vi':'ko'}&dt=t&q=${encodeURIComponent(m.text)}`);
    const d=await res.json();
    m.trans=d[0]?.map(x=>x[0]).join('')||'번역 결과 없음';
  }catch{m.trans='번역할 수 없어요';}
  sc();renderMsgs();
}
function togReact(mid,emoji){
  const m=msgs.find(x=>x.id===mid);if(!m)return;
  if(!m.reactions)m.reactions={};
  m.reactions[emoji]=(m.reactions[emoji]||0)>0?0:1;
  sc();renderMsgs();
}
function msgToWord(id){
  const m=msgs.find(x=>x.id===id);if(!m)return;
  openAddWord();
  const hasKr=/[가-힣]/.test(m.text);

function buildCat(){
  const cats=[...new Set(words.map(w=>w.cat))];
  const sel=document.getElementById('catF');const cur=sel.value;
  sel.innerHTML='<option value="">전체</option>'+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}
function renderWords(){
  const q=(document.getElementById('wordSearch').value||'').toLowerCase();
  const cat=document.getElementById('catF').value;
  const f=words.filter(w=>(!cat||w.cat===cat)&&(!q||(w.kr+w.vn+(w.pron||'')+(w.mean||'')).toLowerCase().includes(q)));
  document.getElementById('wstats').textContent=`전체 ${words.length}개 · 표시 ${f.length}개`;
  const list=document.getElementById('wlist');
  if(!f.length){list.innerHTML='<div class="empty">단어가 없어요</div>';return;}
  list.innerHTML=f.map(w=>{
    const st=stats[w.id]||{};
    return `<div class="wcard">
      <div class="wcc">
        <div class="wkr">${esc(w.kr)}</div>
        <div class="wvn">${esc(w.vn)}</div>
        ${w.pron?`<div class="wpron">[ ${esc(w.pron)} ]</div>`:''}
        ${w.mean?`<div class="wmean">${esc(w.mean)}</div>`:''}
        <div><span class="wcat">${w.cat}</span>${st.wrong>0?`<span class="wwrong">❌${st.wrong}회</span>`:''}</div>
      </div>
      <div class="wbw">
        <button class="wb" onclick="speak('${esq(w.kr)}','ko-KR')">🇰🇷</button>
        <button class="wb" onclick="speak('${esq(w.vn)}','vi-VN')">🇻🇳</button>
        <button class="wb" onclick="editWord(${w.id})">✏️</button>
        <button class="wb" onclick="delWord(${w.id})" style="color:var(--red)">✕</button>
      </div>
    </div>`;
  }).join('');
}
function onSI(){
  const q=document.getElementById('wordSearch').value.trim();
  document.getElementById('wsclr').style.display=q?'block':'none';
  renderWords();clearTimeout(sTimer);
  const dd=document.getElementById('sdd');
  if(!q||q.length<2){dd.classList.remove('open');return;}
  dd.innerHTML='<div style="padding:12px;text-align:center;color:var(--text3);font-size:13px">번역 검색 중...</div>';
  dd.classList.add('open');
  sTimer=setTimeout(()=>doSearch(q),600);
}
async function doSearch(q){
  const dd=document.getElementById('sdd');
  try{
    const hasKr=/[가-힣]/.test(q);
    const res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${hasKr?'ko':'vi'}&tl=${hasKr?'vi':'ko'}&dt=t&q=${encodeURIComponent(q)}`);
    const d=await res.json();const trans=d[0]?.map(x=>x[0]).join('')||'';
    if(!trans){dd.classList.remove('open');return;}
    const kr=hasKr?q:trans,vn=hasKr?trans:q;
    const have=words.find(w=>w.kr===kr||w.vn===vn);
    dd.innerHTML=`<div class="sdd-item"><div><div class="sdkr">🇰🇷 ${esc(kr)}</div><div class="sdvn">🇻🇳 ${esc(vn)}</div></div>
      ${have?'<span style="font-size:11px;color:var(--text3)">이미 있음</span>'
        :`<button class="sdadd" onclick="addFromSearch('${esq(kr)}','${esq(vn)}')">+ 추가</button>`}
    </div>`;dd.classList.add('open');
  }catch{dd.innerHTML='<div style="padding:12px;text-align:center;color:var(--text3);font-size:13px">번역 서버 오류</div>';}
}
function addFromSearch(kr,vn){
  words.push({id:Date.now(),kr,vn,pron:'',mean:'',cat:'기타'});
  sw();buildCat();renderWords();
  document.getElementById('sdd').classList.remove('open');
  document.getElementById('wordSearch').value='';
  document.getElementById('wsclr').style.display='none';
}
function clrSearch(){
  document.getElementById('wordSearch').value='';
  document.getElementById('wsclr').style.display='none';
  document.getElementById('sdd').classList.remove('open');
  renderWords();
}
function editWord(id){
  editWId=id;const w=words.find(x=>x.id===id);
  document.getElementById('wshT').textContent='단어 수정';
  document.getElementById('wshBtn').textContent='수정';
  document.getElementById('w-kr').value=w.kr;
  document.getElementById('w-vn').value=w.vn;
  document.getElementById('w-pron').value=w.pron||'';
  document.getElementById('w-mean').value=w.mean||'';
  document.getElementById('w-cat').value=w.cat;
  document.getElementById('ov-word').classList.add('open');
}
function delWord(id){
  if(!confirm('이 단어를 삭제할까요?'))return;
  words=words.filter(w=>w.id!==id);sw();buildCat();renderWords();
}
function openAddWord(){
  editWId=null;
  document.getElementById('wshT').textContent='단어 추가';
  document.getElementById('wshBtn').textContent='저장';
  ['w-kr','w-vn','w-pron','w-mean'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('w-cat').value='일상';
  document.getElementById('ov-word').classList.add('open');
  setTimeout(()=>document.getElementById('w-kr').focus(),150);
}
function saveWord(){
  const kr=document.getElementById('w-kr').value.trim();
  const vn=document.getElementById('w-vn').value.trim();
  const pron=document.getElementById('w-pron').value.trim();
  const mean=document.getElementById('w-mean').value.trim();
  const cat=document.getElementById('w-cat').value;
  if(!kr||!vn){alert('한국어와 베트남어는 필수예요');return;}
  if(editWId){const i=words.findIndex(w=>w.id===editWId);if(i>=0)words[i]={...words[i],kr,vn,pron,mean,cat};}
  else words.push({id:Date.now(),kr,vn,pron,mean,cat});
  sw();buildCat();renderWords();closeOv('ov-word');
}

// 퀴즈 메인
// ════════════════════════════════════════════════════
function initQuiz(){
  // 세션 증가 → 이전에 예약된 모든 setTimeout 무력화
  qSession++;
  clrSpTimer();
  window._sp=null; window._ls=null; window._mc=null;

    </div>
    <div class="qmgrid">
      <div class="qmc ${qMode==='mcq'?'active':''}" onclick="setQM('mcq',this)">
        <div class="qmci">🔢</div><div class="qmcn">4지선다</div>
        <div class="qmcd">보기 4개 중<br>정답을 골라요</div>
      </div>
      <div class="qmc ${qMode==='speed'?'active':''}" onclick="setQM('speed',this)">
        <div class="qmci">⚡</div><div class="qmcn">스피드 퀴즈</div>
        <div class="qmcd">5초 안에 선택!<br>빠르게 도전</div>
      </div>
      <div class="qmc ${qMode==='match'?'active':''}" onclick="setQM('match',this)">
        <div class="qmci">🧩</div><div class="qmcn">매칭 게임</div>
        <div class="qmcd">한국어↔베트남어<br>짝을 맞춰요</div>
      </div>
      <div class="qmc ${qMode==='listen'?'active':''}" onclick="setQM('listen',this)">
        <div class="qmci">🎧</div><div class="qmcn">듣고 맞추기</div>
        <div class="qmcd">발음 듣고<br>뭔지 골라요</div>
      </div>
      <div class="qmc ${qMode==='fill'?'active':''}" onclick="setQM('fill',this)" style="grid-column:1/-1">
        <div class="qmci">✏️</div><div class="qmcn">빈칸 채우기</div>
        <div class="qmcd">베트남어 중간 글자를 숨겼어요 — 힌트 보고 맞춰보세요!</div>

function setQM(m,el){
  qMode=m;
  document.querySelectorAll('.qmc').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function startWrong(){
  qSession++;clrSpTimer();window._sp=null;window._ls=null;window._mc=null;
  qW=words.filter(w=>stats[w.id]&&stats[w.id].wrong>0).sort(()=>Math.random()-.5);
  qI=0;qSc=0;qTot=0;qWIds=[];dispatchMode();
}
function startQuiz(){
  qSession++;clrSpTimer();window._sp=null;window._ls=null;window._mc=null;
  qI=0;qSc=0;qTot=0;qWIds=[];
  qW=[...words].sort(()=>Math.random()-.5);
  dispatchMode();
}
function dispatchMode(){
  if(qMode==='mcq') renderMCQ();
  else if(qMode==='speed') renderSpeed();
  else if(qMode==='match') startMatch();
  else if(qMode==='listen') renderListen();
  else if(qMode==='fill') renderFill();
}

// 공통 헤더
function qHead(i,tot,sc,ttot){
  const pct=Math.round(i/tot*100);
  return `<div class="qtop" style="width:100%;max-width:420px">
    <span style="font-size:13px;color:var(--text2)">${i} / ${tot}</span>
    <span style="font-size:13px;font-weight:600;color:var(--primary)">✅${sc} ❌${ttot-sc}</span>
  </div>
  <div class="qpb"><div class="qpbf" style="width:${pct}%"></div></div>`;
}

// ─── 4지선다 ───
function renderMCQ(){
  if(qI>=qW.length){showResult();return;}
  const w=qW[qI];
  const pool=words.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[{w,ok:true},...pool.map(x=>({w:x,ok:false}))].sort(()=>Math.random()-.5);
  window._mc={choices,w,done:false};
  document.getElementById('qwrap').innerHTML=`
    ${qHead(qI,qW.length,qSc,qTot)}
    <button onclick="initQuiz()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:2px">← 뒤로</button>
    <div class="mcqq">
      <div class="mcqqw">${esc(w.kr)}</div>
      ${w.pron?`<div class="mcqqp">[ ${esc(w.pron)} ]</div>`:''}
      <div style="margin-top:10px"><button class="tts-btn" style="margin:0 auto" onclick="speak('${esq(w.kr)}','ko-KR')">🔊 한국어 발음</button></div>
    </div>
    <div class="mcqcs">
      ${choices.map((c,i)=>`<button class="mcqb" id="mc${i}" onclick="ansMCQ(${i},${c.ok})">${esc(c.w.vn)}</button>`).join('')}
    </div>`;
}
function ansMCQ(idx,ok){
  if(!window._mc||window._mc.done)return;
  window._mc.done=true;const w=window._mc.w;
  window._mc.choices.forEach((c,i)=>{
    const b=document.getElementById('mc'+i);if(!b)return;
    if(c.ok)b.classList.add('cor');
    else if(i===idx&&!ok)b.classList.add('wro');
  });
  if(!stats[w.id])stats[w.id]={correct:0,wrong:0};
  if(ok){stats[w.id].correct++;qSc++;}else{stats[w.id].wrong++;qWIds.push(w.id);}
  qTot++;ss();
  const s=qSession;
  setTimeout(()=>{if(qSession!==s)return;qI++;renderMCQ();},900);
}

// ─── 스피드 ───
function renderSpeed(){
  clrSpTimer();
  if(qI>=qW.length){showResult();return;}
  const w=qW[qI];
  const pool=words.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[{w,ok:true},...pool.map(x=>({w:x,ok:false}))].sort(()=>Math.random()-.5);
  window._sp={choices,w,done:false};
  // 정수 카운터 사용 (부동소수점 오차 방지)
  let ticksLeft = spMax * 10; // 50 = 5초 × 10ticks
  document.getElementById('qwrap').innerHTML=`
    ${qHead(qI,qW.length,qSc,qTot)}
    <button onclick="initQuiz()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:2px">← 뒤로</button>
    <div class="sptw">
      <div class="sptb"><div class="sptbf" id="stf" style="width:100%"></div></div>
      <div class="sptxt" id="stt">${spMax}</div>
    </div>
    <div class="spq">
      <div style="font-size:26px;font-weight:700">${esc(w.kr)}</div>
      ${w.pron?`<div style="font-size:12px;color:var(--blue);font-family:monospace;margin-top:4px">[ ${esc(w.pron)} ]</div>`:''}
    </div>
    <div class="spcs">
      ${choices.map((c,i)=>`<button class="spb" id="sp${i}" onclick="ansSpeed(${i})">${esc(c.w.vn)}</button>`).join('')}
    </div>`;
  const mySession=qSession;
  spTimer=setInterval(()=>{
    // 세션 바뀌면 즉시 중단
    if(qSession!==mySession){clrSpTimer();return;}
    if(window._sp&&window._sp.done){clrSpTimer();return;}
    ticksLeft--;
    const pct=Math.max(0,ticksLeft/(spMax*10)*100);
    const sec=Math.ceil(ticksLeft/10);
    const f=document.getElementById('stf'),t=document.getElementById('stt');
    if(f){f.style.width=pct+'%';f.style.background=sec<=1?'var(--red)':sec<=3?'var(--amber)':'var(--primary)';}
    if(t)t.textContent=sec;
    if(ticksLeft<=0){
      clrSpTimer();
      if(window._sp&&!window._sp.done){
        window._sp.done=true;
        const wd=window._sp.w;
        window._sp.choices.forEach((c,i)=>{const b=document.getElementById('sp'+i);if(b&&c.ok)b.classList.add('hit');});
        if(!stats[wd.id])stats[wd.id]={correct:0,wrong:0};
        stats[wd.id].wrong++;qWIds.push(wd.id);qTot++;ss();
        setTimeout(()=>{if(qSession!==mySession)return;qI++;renderSpeed();},900);
      }
    }
  },100);
}
function ansSpeed(idx){
  if(!window._sp||window._sp.done)return;
  clrSpTimer();
  window._sp.done=true;
  const ok=window._sp.choices[idx].ok;
  const w=window._sp.w;
  window._sp.choices.forEach((c,i)=>{
    const b=document.getElementById('sp'+i);if(!b)return;
    if(c.ok)b.classList.add('hit');
    else if(i===idx&&!ok)b.classList.add('mis');
  });
  if(!stats[w.id])stats[w.id]={correct:0,wrong:0};
  if(ok){stats[w.id].correct++;qSc++;}else{stats[w.id].wrong++;qWIds.push(w.id);}
  qTot++;ss();
  const s=qSession;
  setTimeout(()=>{if(qSession!==s)return;qI++;renderSpeed();},700);
}
function clrSpTimer(){if(spTimer){clearInterval(spTimer);spTimer=null;}}

// ─── 매칭 게임 ───
function startMatch(){
  const pool=qW.slice(0,6);mPairs=pool.map(w=>({id:w.id,kr:w.kr,vn:w.vn,pron:w.pron}));mSel=null;mDone=0;
  renderMatch();
}
function renderMatch(){
  const right=[...mPairs].sort(()=>Math.random()-.5);
  window._mL=mPairs.map((p,i)=>({key:`L${i}`,text:p.kr,pid:p.id}));
  window._mR=right.map((p,i)=>({key:`R${i}`,text:p.vn,pid:p.id}));
  document.getElementById('qwrap').innerHTML=`
    <div style="width:100%;max-width:420px;text-align:center;margin-bottom:4px">
      <div style="font-size:18px;font-weight:700">🧩 매칭 게임</div>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">짝지어 보세요!</div>
    </div>
    <button onclick="initQuiz()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:4px">← 뒤로</button>
    <div class="mgame">
      <div>
        <div class="mgcol-t">🇰🇷 한국어</div>
        ${window._mL.map((it,i)=>`<div class="mgi" id="m-${it.key}" onclick="matchTap('${it.key}',${i},'L')">${esc(it.text)}</div>`).join('')}
      </div>
      <div>
        <div class="mgcol-t">🇻🇳 베트남어</div>
        ${window._mR.map((it,i)=>`<div class="mgi" id="m-${it.key}" onclick="matchTap('${it.key}',${i},'R')">${esc(it.text)}</div>`).join('')}
      </div>
    </div>`;
}
function matchTap(key,idx,side){
  const el=document.getElementById('m-'+key);
  if(el.classList.contains('done'))return;
  const items=side==='L'?window._mL:window._mR;
  const item=items[idx];
  if(!mSel){
    document.querySelectorAll('.mgi').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');mSel={key,idx,side,pid:item.pid,el};
  } else {
    if(mSel.side===side){
      document.querySelectorAll('.mgi').forEach(e=>e.classList.remove('sel'));
      el.classList.add('sel');mSel={key,idx,side,pid:item.pid,el};return;
    }
    if(mSel.pid===item.pid){
      mSel.el.classList.remove('sel');mSel.el.classList.add('done');el.classList.add('done');
      const pair=mPairs.find(p=>p.id===item.pid);
      if(pair?.pron)mSel.el.innerHTML+=`<div style="font-size:9px;color:var(--green);margin-top:2px">[${esc(pair.pron)}]</div>`;
      if(!stats[item.pid])stats[item.pid]={correct:0,wrong:0};stats[item.pid].correct++;ss();
      mSel=null;mDone++;
      if(mDone>=mPairs.length)setTimeout(showMatchDone,500);
    } else {
      mSel.el.classList.remove('sel');mSel.el.classList.add('bad');el.classList.add('bad');
      const a=mSel.el,b=el;
      setTimeout(()=>{a.classList.remove('bad');b.classList.remove('bad');},500);
      [mSel.pid,item.pid].forEach(pid=>{if(!stats[pid])stats[pid]={correct:0,wrong:0};stats[pid].wrong++;});ss();
      mSel=null;
    }
  }
}
function showMatchDone(){
  document.getElementById('qwrap').innerHTML=`
    <div class="qres">
      <div style="font-size:48px">🧩</div>
      <div style="font-size:22px;font-weight:700;color:var(--green)">완성!</div>
      <div style="font-size:14px;color:var(--text2)">${mPairs.length}쌍 모두 맞췄어요!</div>
      <div class="res-btns">
        <button class="res-btn" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)" onclick="startMatch()">다시 하기</button>
        <button class="res-btn" style="background:var(--primary);color:#fff" onclick="initQuiz()">모드 선택</button>

// ─── 듣고 맞추기 ───
function renderListen(){
  if(qI>=qW.length){showResult();return;}
  const w=qW[qI];
  const pool=words.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[{w,ok:true},...pool.map(x=>({w:x,ok:false}))].sort(()=>Math.random()-.5);
  window._ls={choices,w,done:false,played:false};
  document.getElementById('qwrap').innerHTML=`
    ${qHead(qI,qW.length,qSc,qTot)}
    <button onclick="initQuiz()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:2px">← 뒤로</button>
    <div class="listenq">
      <div style="font-size:12px;color:var(--text3)">베트남어 발음을 듣고 한국어를 골라요</div>
      <button class="listen-btn" id="listenBtn" onclick="playListen()">🔊</button>
      <div class="listen-hint" id="listenHint">🔊 버튼을 눌러 발음을 들어보세요</div>
    </div>
    <div class="listen-choices">
      ${choices.map((c,i)=>`<button class="lcb" id="lc${i}" onclick="ansListen(${i})">${esc(c.w.kr)}</button>`).join('')}
    </div>`;
  // 자동 재생 (약간 딜레이)
  setTimeout(()=>{if(window._ls&&!window._ls.done)playListen();},500);
}
function playListen(){
  if(!window._ls)return;
  const w=window._ls.w;
  const btn=document.getElementById('listenBtn');
  if(btn)btn.classList.add('playing');
  try{
    speak(w.vn,'vi-VN');
    const hint=document.getElementById('listenHint');
    if(hint)hint.textContent='한국어 뜻을 골라보세요 👇';
    window._ls.played=true;
  }catch(e){
    console.warn('TTS 오류:',e);
    const hint=document.getElementById('listenHint');
    if(hint)hint.textContent='(발음 재생 불가) 한국어 뜻을 골라보세요';
    window._ls.played=true;
  }
  setTimeout(()=>{if(btn)btn.classList.remove('playing');},1500);
}
function ansListen(idx){
  if(!window._ls||window._ls.done)return;
  // 한 번도 안 들었으면 먼저 재생
  if(!window._ls.played){playListen();return;}
  window._ls.done=true;
  const ok=window._ls.choices[idx].ok;
  const w=window._ls.w;
  window._ls.choices.forEach((c,i)=>{
    const b=document.getElementById('lc'+i);if(!b)return;
    if(c.ok)b.classList.add('cor');
    else if(i===idx&&!ok)b.classList.add('wro');
  });
  if(ok){try{speak(w.vn,'vi-VN');}catch(e){}}
  if(!stats[w.id])stats[w.id]={correct:0,wrong:0};
  if(ok){stats[w.id].correct++;qSc++;}else{stats[w.id].wrong++;qWIds.push(w.id);}
  qTot++;ss();
  const s=qSession;
  setTimeout(()=>{if(qSession!==s)return;qI++;renderListen();},1100);
}

// ─── 빈칸 채우기 ───
function renderFill(){
  if(qI>=qW.length){showResult();return;}
  const w=qW[qI];
  // 베트남어에서 글자를 일부 숨기고 보기 만들기
  const masked=makeMasked(w.vn);
  // 보기: 숨긴 부분 + 오답 3개
  const correct=masked.hiddenChars;
  const pool=genWrongChars(correct,3);
  const choices=[correct,...pool].sort(()=>Math.random()-.5);
  window._fi={w,correct,done:false,masked};
  document.getElementById('qwrap').innerHTML=`
    ${qHead(qI,qW.length,qSc,qTot)}
    <button onclick="initQuiz()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:2px">← 뒤로</button>
    <div class="fillq">
      <div class="fill-kr">${esc(w.kr)}</div>
      ${w.pron?`<div style="font-size:12px;color:var(--blue);font-family:monospace;margin-bottom:6px">[ ${esc(w.pron)} ]</div>`:''}
      <div class="fill-vn">${esc(masked.display)}</div>
      <div class="fill-hint">빈 칸(___) 에 들어갈 글자를 골라요</div>
      <button class="tts-btn" style="margin:0 auto 4px" onclick="speak('${esq(w.vn)}','vi-VN')">🔊 힌트 듣기</button>
    </div>
    <div class="fill-choices">
      ${choices.map((c,i)=>`<button class="fcb" id="fc${i}" onclick="ansFill(${i},'${esq(c)}')">${esc(c)}</button>`).join('')}
    </div>`;
}
function makeMasked(vn){
  const words2=vn.split(' ');
  if(words2.length<=1){
    // 단어 하나면 뒤 절반 숨기기
    const half=Math.ceil(vn.length/2);
    return{display:vn.substring(0,half)+'___',hiddenChars:vn.substring(half)};
  }
  // 마지막 단어 숨기기
  const last=words2[words2.length-1];
  const rest=words2.slice(0,-1).join(' ');
  return{display:rest+' ___',hiddenChars:last};
}
function genWrongChars(correct,n){
  // 베트남어 단어 풀에서 비슷한 길이 오답 뽑기
  const pool=words.filter(w=>w.id!==window._fi?.w.id)
    .map(w=>{const m=makeMasked(w.vn);return m.hiddenChars;})
    .filter(c=>c!==correct&&c.length>0);
  const uniq=[...new Set(pool)];
  return uniq.sort(()=>Math.random()-.5).slice(0,n);
}
function ansFill(idx,choice){
  if(window._fi.done)return;window._fi.done=true;
  const w=window._fi.w;const correct=window._fi.correct;
  const ok=choice===correct;
  for(let i=0;i<4;i++){
    const b=document.getElementById('fc'+i);if(!b)continue;
    if(b.textContent===correct)b.classList.add('cor');
    else if(i===idx&&!ok)b.classList.add('wro');
  }
  if(!stats[w.id])stats[w.id]={correct:0,wrong:0};
  if(ok){stats[w.id].correct++;qSc++;}else{stats[w.id].wrong++;qWIds.push(w.id);}
  qTot++;ss();
  const s=qSession;
  setTimeout(()=>{if(qSession!==s)return;qI++;renderFill();},1000);
}

// ─── 결과 ───
function showResult(){
  const pct=qTot?Math.round(qSc/qTot*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':pct>=30?'💪':'📚';
  const msg=pct>=90?'완벽해요!':pct>=70?'잘했어요!':pct>=50?'좋아요!':pct>=30?'더 연습해봐요!':'단어장을 복습해봐요!';
  const wl=words.filter(w=>qWIds.includes(w.id));
  const ws=wl.length?`<div class="wrl"><div class="wrl-t">❌ 틀린 단어 (${wl.length}개)</div>
    ${wl.map(w=>`<div class="wrl-i"><strong>${esc(w.kr)}</strong> → ${esc(w.vn)} ${w.pron?`<span style="color:var(--red)">[${esc(w.pron)}]</span>`:''}</div>`).join('')}
  </div>`:'';
  document.getElementById('qwrap').innerHTML=`
    <div class="qres">
      <div style="font-size:48px">${emoji}</div>
      <div style="font-size:32px;font-weight:700;color:var(--primary)">${qSc} / ${qTot}</div>
      <div style="font-size:28px;font-weight:700;color:var(--primary)">${pct}점</div>
      <div style="font-size:14px;color:var(--text2)">${msg}</div>
      <div class="res-btns">
        <button class="res-btn" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)" onclick="startQuiz()">다시 하기</button>
        <button class="res-btn" style="background:var(--primary);color:#fff" onclick="initQuiz()">모드 선택</button>
      </div>
    </div>${ws}`;
}

function delPhrase(id){

}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function esq(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function closeOv(id){document.getElementById(id).classList.remove('open');}
['ov-nick','ov-word','ov-phrase'].forEach(id=>{

let grSession=0, grQI=0, grQSc=0, grQTot=0, grQWrong=[], grQList=[];
let grMode='fill';

function renderGrammar(){
  const q=(document.getElementById('grSearch')?.value||'').toLowerCase();
  const lv=document.getElementById('grLvFilter')?.value||'';
  const f=GRAMMAR.filter(g=>
    (!lv||g.lv===lv)&&
    (!q||g.title.toLowerCase().includes(q)||g.meaning.toLowerCase().includes(q))
  );
  document.getElementById('grStats').textContent=`총 ${GRAMMAR.length}개 · 표시 ${f.length}개`;
  const list=document.getElementById('grList');
  if(!f.length){list.innerHTML='<div class="empty">검색 결과가 없어요</div>';return;}
  list.innerHTML=f.map(g=>`
    <div class="gr-card">
      <div class="gr-top">
        <div class="gr-title">${esc(g.title)}</div>
        <span class="gr-lv">${g.lv}</span>
      </div>
      <div class="gr-meaning">${esc(g.meaning)}</div>
      <div class="gr-vn">${esc(g.meaning_vn)}</div>
      <div class="gr-ex-title">예문</div>
      ${g.examples.map(ex=>`
        <div class="gr-ex">
          <div class="gr-ex-kr">${esc(ex.kr)}</div>
          <div class="gr-ex-vn">${esc(ex.vn)}</div>
          <div class="gr-ex-pron">[ ${esc(ex.pron)} ]</div>
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="tts-btn" style="padding:4px 10px;font-size:11px" onclick="speak('${esq(ex.kr)}','ko-KR')">🔊 한</button>
            <button class="tts-btn" style="padding:4px 10px;font-size:11px" onclick="speak('${esq(ex.vn)}','vi-VN')">🔊 베</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function startGrQuiz(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ti').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-quiz').classList.add('active');
  document.querySelectorAll('.ti')[3].classList.add('active');
  showGrModeSelect();
}

      <div style="font-size:13px;color:var(--text2);margin-bottom:16px">총 ${GRAMMAR.length}개 문법 · ${fillCount}개 문항</div>
    </div>
    <div class="qmgrid" style="width:100%;max-width:420px">

        <div class="qmci">✏️</div>
        <div class="qmcn">빈칸 채우기</div>

      </div>
      <div class="qmc ${grMode==='meaning'?'active':''}" onclick="setGrMode('meaning',this)">

        <button id="grl-all" onclick="setGrLv('all')" style="flex:1;padding:10px;border-radius:var(--r);border:1.5px solid var(--purple);background:var(--purple-bg);color:var(--purple);font-size:13px;font-weight:600;cursor:pointer">전체</button>
        <button id="grl-2" onclick="setGrLv('2')" style="flex:1;padding:10px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer">2급만</button>
        <button id="grl-3" onclick="setGrLv('3')" style="flex:1;padding:10px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer">3급만</button>
      </div>

    <button onclick="launchGrQuiz()" style="width:100%;max-width:420px;padding:14px;border-radius:var(--rl);background:var(--purple);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer">시작하기 →</button>
    <button onclick="showPage('grammar',document.querySelectorAll('.ti')[5])" style="font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer">← 문법 목록으로</button>`;

function setGrMode(m,el){
  grMode=m;
  document.querySelectorAll('.qmc').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setGrLv(lv){
  window._grLv=lv;
  ['all','2','3'].forEach(k=>{
    const b=document.getElementById('grl-'+k);if(!b)return;
    if(k===lv){b.style.borderColor='var(--purple)';b.style.background='var(--purple-bg)';b.style.color='var(--purple)';}
    else{b.style.borderColor='var(--border2)';b.style.background='var(--bg2)';b.style.color='var(--text2)';}
  });
}
function launchGrQuiz(){
  const lv=window._grLv||'all';
  const pool=lv==='all'?GRAMMAR:GRAMMAR.filter(g=>g.lv===lv+'급');
  grSession++;grQI=0;grQSc=0;grQTot=0;grQWrong=[];
  if(grMode==='fill'){
    grQList=[];
    pool.forEach(g=>g.quiz.forEach(q=>grQList.push({...q,grammarTitle:g.title,grammarLv:g.lv,type:'fill'})));
  } else {
    grQList=pool.map(g=>{
      const wrong=GRAMMAR.filter(x=>x.id!==g.id).sort(()=>Math.random()-.5).slice(0,3);
      const choices=[g.meaning,...wrong.map(x=>x.meaning)].sort(()=>Math.random()-.5);
      return{type:'meaning',title:g.title,lv:g.lv,correct:g.meaning,choices,grammarTitle:g.title,grammarLv:g.lv};
    });
  }
  grQList=grQList.sort(()=>Math.random()-.5);
  if(!grQList.length){alert('해당 레벨의 문법이 없어요');showGrModeSelect();return;}
  renderGrQ();
}

function renderGrQ(){
  if(grQI>=grQList.length){showGrResult();return;}
  const q=grQList[grQI];
  const pct=Math.round(grQI/grQList.length*100);
  const myS=grSession;
  const hdr=`
    <div class="qtop" style="width:100%;max-width:420px">
      <span style="font-size:13px;color:var(--text2)">${grQI+1} / ${grQList.length}</span>
      <span style="font-size:13px;font-weight:600;color:var(--purple)">✅${grQSc} ❌${grQTot-grQSc}</span>
    </div>
    <div class="qpb"><div class="qpbf" style="width:${pct}%;background:var(--purple)"></div></div>
    <button onclick="showGrModeSelect()" style="align-self:flex-start;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;margin-bottom:4px">← 뒤로</button>
    <div style="font-size:11px;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple);font-weight:600;align-self:flex-start">${q.grammarTitle} · ${q.grammarLv}</div>`;
  if(!q.type||q.type==='fill'){
    document.getElementById('qwrap').innerHTML=hdr+`
      <div class="grq-card">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">빈 칸에 알맞은 것을 골라요</div>
        <div class="grq-q">${esc(q.q.replace(q.blank,'___'))}</div>
      </div>
      <div class="grq-choices">
        ${q.choices.map((c,i)=>`<button class="grcb" id="grc${i}" onclick="ansGrQ(${i})">${esc(c)}</button>`).join('')}
      </div>`;
  } else {
    document.getElementById('qwrap').innerHTML=hdr+`
      <div class="grq-card">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">이 문법의 뜻은 무엇일까요?</div>
        <div style="font-size:24px;font-weight:700;color:var(--purple);text-align:center;padding:8px 0">${esc(q.title)}</div>
      </div>
      <div class="grq-choices">
        ${q.choices.map((c,i)=>`<button class="grcb" id="grc${i}" onclick="ansGrQ(${i})" style="font-size:13px;line-height:1.5">${esc(c)}</button>`).join('')}
      </div>`;
  }
  window._grq={q,done:false,myS};
}
function ansGrQ(idx){
  if(!window._grq||window._grq.done)return;
  window._grq.done=true;
  const q=window._grq.q;
  const correct=(!q.type||q.type==='fill')?q.blank:q.correct;
  const ok=q.choices[idx]===correct;
  q.choices.forEach((c,i)=>{
    const b=document.getElementById('grc'+i);if(!b)return;
    if(c===correct)b.classList.add('cor');
    else if(i===idx&&!ok)b.classList.add('wro');
  });
  if(ok)grQSc++;else grQWrong.push(q);
  grQTot++;
  const s=grSession;
  setTimeout(()=>{if(grSession!==s)return;grQI++;renderGrQ();},900);
}
function showGrResult(){
  const pct=grQTot?Math.round(grQSc/grQTot*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':pct>=30?'💪':'📚';
  const wl=grQWrong.length?`<div class="wrl" style="width:100%;max-width:420px">
    <div class="wrl-t">❌ 틀린 문법 (${grQWrong.length}개)</div>
    ${grQWrong.map(q=>`<div class="wrl-i"><strong>${esc(q.grammarTitle)}</strong>
      ${(!q.type||q.type==='fill')?`<div style="font-size:12px;margin-top:2px">${esc(q.q.replace(q.blank,'___'))}</div><div style="color:var(--green);font-weight:700">정답: ${esc(q.blank)}</div>`:
      `<div style="font-size:12px;margin-top:2px;color:var(--green)">${esc(q.correct)}</div>`}
    </div>`).join('')}
  </div>`:'';
  document.getElementById('qwrap').innerHTML=`
    <div class="qres">
      <div style="font-size:48px">${emoji}</div>
      <div style="font-size:32px;font-weight:700;color:var(--purple)">${grQSc} / ${grQTot}</div>
      <div style="font-size:28px;font-weight:700;color:var(--purple)">${pct}점</div>
      <div style="font-size:14px;color:var(--text2)">${pct>=70?'문법 실력이 늘고 있어요! 💜':'조금 더 연습해봐요! 화이팅!'}</div>
      <div class="res-btns">
        <button class="res-btn" style="background:var(--purple);color:#fff" onclick="launchGrQuiz()">다시 하기</button>
        <button class="res-btn" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)" onclick="showGrModeSelect()">모드 선택</button>
        <button class="res-btn" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)" onclick="showPage('grammar',document.querySelectorAll('.ti')[5])">문법 보기</button>
      </div>
    </div>${wl}`;
}
document.getElementById('chip-other').textContent=nicks.other;
renderHome();renderMsgs();
</script>
</body>
</html>
