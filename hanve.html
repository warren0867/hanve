<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한베 · HanVe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f9f9f7;--bg3:#f3f2ee;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e9a;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --primary:#f97316;--primary-bg:#fff7ed;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --red:#a32d2d;--red-bg:#fcebeb;
  --amber:#854f0b;--amber-bg:#faeeda;
  --radius:10px;--radius-lg:16px;--radius-xl:20px;
  --me:#f97316;--other:#f3f2ee;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--bg2:#222220;--bg3:#2a2a28;
  --text:#f3f2ee;--text2:#9e9e9a;--text3:#6b6b67;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --primary-bg:#431407;--other:#2a2a28;
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Pretendard',sans-serif;font-size:14px;background:var(--bg3);color:var(--text);display:flex;flex-direction:column}

/* 헤더 */
.app-header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-title{font-size:17px;font-weight:700;color:var(--primary)}
.app-title small{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:8px;font-size:18px;line-height:1;transition:background .15s}
.icon-btn:hover{background:var(--bg3)}

/* 탭바 */
.tab-bar{background:var(--bg);border-top:0.5px solid var(--border);display:flex;flex-shrink:0}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;transition:color .15s}
.tab-item.active{color:var(--primary)}
.tab-icon{font-size:20px;line-height:1}

/* 페이지 */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* ─── 채팅 ─── */
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg-group{display:flex;flex-direction:column;gap:3px}
.msg-group.me{align-items:flex-end}
.msg-group.other{align-items:flex-start}
.msg-sender{font-size:11px;color:var(--text3);padding:0 4px}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-group.me .msg-row{flex-direction:row-reverse}
.bubble{max-width:72%;padding:9px 13px;border-radius:var(--radius-xl);font-size:14px;line-height:1.5;word-break:break-word}
.msg-group.me .bubble{background:var(--me);color:#fff;border-bottom-right-radius:6px}
.msg-group.other .bubble{background:var(--other);color:var(--text);border-bottom-left-radius:6px}
.msg-time{font-size:10px;color:var(--text3);white-space:nowrap;margin-bottom:2px}
.msg-actions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mab{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.mab:hover{background:var(--primary-bg);color:var(--primary);border-color:var(--primary)}
.mab.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.trans-bubble{margin-top:4px;font-size:12px;color:var(--blue);background:var(--blue-bg);padding:7px 11px;border-radius:10px;border-left:2px solid var(--blue);line-height:1.5}
.trans-loading{color:var(--text3);font-style:italic}

.chat-input-area{background:var(--bg);border-top:0.5px solid var(--border);padding:8px 12px;flex-shrink:0}
.chat-who-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.who-chip{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-weight:500;transition:all .15s}
.who-chip.active{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.who-label{font-size:11px;color:var(--text3)}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;font-size:14px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:22px;background:var(--bg2);color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color .15s}
.chat-input:focus{border-color:var(--primary);background:var(--bg)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.85}

/* ─── 단어장 ─── */
.word-toolbar{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.word-search-wrap{flex:1;min-width:180px;position:relative}
.word-search-inp{width:100%;font-size:13px;padding:8px 36px 8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s}
.word-search-inp:focus{border-color:var(--primary)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;display:none}
.word-filter-sel{font-size:12px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;cursor:pointer}
.add-word-btn{font-size:12px;padding:7px 14px;border-radius:var(--radius);border:none;background:var(--primary);color:#fff;cursor:pointer;font-weight:600;white-space:nowrap}
.add-word-btn:hover{opacity:.85}
.word-stats{font-size:12px;color:var(--text3);padding:6px 12px 2px}
.word-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.word-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.word-card:hover{border-color:var(--border2)}
.word-content{flex:1;min-width:0}
.word-kr{font-size:14px;font-weight:600}
.word-vn{font-size:13px;color:var(--primary);margin-top:2px}
.word-pron{font-size:11px;color:var(--text3);margin-top:1px}
.word-cat{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;background:var(--primary-bg);color:var(--primary);font-weight:500;margin-top:3px}
.word-right{display:flex;gap:6px;flex-shrink:0}
.word-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;border-radius:6px}
.word-del-btn:hover{color:var(--red);background:var(--red-bg)}
.word-empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:13px}

/* 검색 결과 드롭다운 */
.search-dd{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:260px;overflow-y:auto;display:none;margin-top:2px}
.search-dd.open{display:block}
.dd-item{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:var(--bg2)}
.dd-kr{font-weight:600}
.dd-vn{color:var(--primary)}
.dd-add{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--primary-bg);color:var(--primary);border:0.5px solid var(--primary);white-space:nowrap}
.dd-searching{padding:12px;text-align:center;color:var(--text3);font-size:13px}

/* ─── 퀴즈 ─── */
.quiz-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:1rem;gap:.75rem;overflow-y:auto}
.quiz-top{width:100%;max-width:400px;display:flex;align-items:center;justify-content:space-between}
.quiz-progress-txt{font-size:13px;color:var(--text2)}
.quiz-score-txt{font-size:13px;font-weight:600;color:var(--primary)}
.prog-bar{width:100%;max-width:400px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s}
.flashcard{width:100%;max-width:400px;min-height:190px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-xl);padding:1.75rem;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 20px rgba(0,0,0,.06);transition:transform .15s}
.flashcard:active{transform:scale(.98)}
.card-hint{font-size:11px;color:var(--text3)}
.card-q{font-size:26px;font-weight:700;line-height:1.3}
.card-pron{font-size:12px;color:var(--text3);margin-top:2px}
.card-tap{font-size:11px;color:var(--text3);margin-top:10px}
.card-ans{font-size:22px;font-weight:600;color:var(--primary);margin-top:6px;animation:fi .25s ease}
.card-ans-pron{font-size:12px;color:var(--text3)}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.quiz-btns{display:flex;gap:10px;width:100%;max-width:400px}
.qbtn{flex:1;padding:13px;border-radius:var(--radius-lg);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.qbtn.wrong{background:var(--red-bg);color:var(--red)}.qbtn.wrong:hover{filter:brightness(.95)}
.qbtn.correct{background:var(--green-bg);color:var(--green)}.qbtn.correct:hover{filter:brightness(.95)}
.qbtn.next{background:var(--primary);color:#fff}.qbtn.next:hover{opacity:.85}
.quiz-modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px}
.qmode-btn{padding:10px 8px;border-radius:var(--radius-lg);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.4}
.qmode-btn.active{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.quiz-start-btn{width:100%;max-width:400px;padding:14px;border-radius:var(--radius-lg);background:var(--primary);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer}
.quiz-start-btn:hover{opacity:.85}
.quiz-result{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;padding:2rem 1rem}
.res-emoji{font-size:48px}
.res-score{font-size:32px;font-weight:700;color:var(--primary)}
.res-sub{font-size:14px;color:var(--text2)}
.res-btns{display:flex;gap:10px;margin-top:.5rem}
.res-btn{padding:12px 24px;border-radius:var(--radius-lg);border:none;font-size:14px;font-weight:600;cursor:pointer}
.quiz-empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}

/* ─── 닉네임 설정 모달 ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:1.5rem;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem}
.sheet h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;text-align:center}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.form-inp,.form-sel{width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s}
.form-inp:focus,.form-sel:focus{border-color:var(--primary);background:var(--bg)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sheet-btns{display:flex;gap:8px;margin-top:1rem}
.sheet-cancel{flex:1;padding:12px;border-radius:var(--radius-lg);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px}
.sheet-save{flex:2;padding:12px;border-radius:var(--radius-lg);border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.sheet-cancel:hover{background:var(--bg3)}
.sheet-save:hover{opacity:.85}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">한베 <small>HanVe</small></div>
  <div style="display:flex;gap:4px">
    <button class="icon-btn" onclick="openNick()" title="닉네임 설정">👤</button>
    <button class="icon-btn" onclick="openAddWord()" title="단어 추가">＋</button>
  </div>
</div>

<!-- ═══ 채팅 ═══ -->
<div class="page active" id="page-chat">
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-area">
    <div class="chat-who-row">
      <span class="who-label">보내는 사람:</span>
      <button class="who-chip active" id="chip-me" onclick="setWho('me')">나</button>
      <button class="who-chip" id="chip-other" onclick="setWho('other')">상대방</button>
    </div>
    <div class="chat-row">
      <textarea class="chat-input" id="chatInput" placeholder="메시지 입력..." rows="1" onkeydown="chatKey(event)" oninput="autoH(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- ═══ 단어장 ═══ -->
<div class="page" id="page-words">
  <div class="word-toolbar">
    <div class="word-search-wrap">
      <input class="word-search-inp" type="text" id="wordSearch" placeholder="단어 검색 또는 번역..." oninput="onSearchInput()" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      <div class="search-dd" id="searchDd"></div>
    </div>
    <select class="word-filter-sel" id="catFilter" onchange="renderWords()">
      <option value="">전체</option>
    </select>
    <button class="add-word-btn" onclick="openAddWord()">+ 추가</button>
  </div>
  <div class="word-stats" id="wordStats"></div>
  <div class="word-list" id="wordList"></div>
</div>

<!-- ═══ 퀴즈 ═══ -->
<div class="page" id="page-quiz">
  <div class="quiz-wrap" id="quizWrap"></div>
</div>

<!-- 탭바 -->
<div class="tab-bar">
  <button class="tab-item active" onclick="showPage('chat',this)"><div class="tab-icon">💬</div>채팅</button>
  <button class="tab-item" onclick="showPage('words',this)"><div class="tab-icon">📖</div>단어장</button>
  <button class="tab-item" onclick="showPage('quiz',this)"><div class="tab-icon">🎯</div>퀴즈</button>
</div>

<!-- 닉네임 시트 -->
<div class="overlay" id="nickOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>닉네임 설정</h3>
    <div class="form-2col">
      <div><label class="form-label">내 닉네임</label><input class="form-inp" id="nick-me" placeholder="예: 동영"></div>
      <div><label class="form-label">상대방 닉네임</label><input class="form-inp" id="nick-other" placeholder="예: 아내"></div>
    </div>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeSheet('nickOverlay')">취소</button>
      <button class="sheet-save" onclick="saveNick()">저장</button>
    </div>
  </div>
</div>

<!-- 단어 추가 시트 -->
<div class="overlay" id="wordOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="wordSheetTitle">단어 추가</h3>
    <div class="form-2col">
      <div><label class="form-label">한국어 🇰🇷</label><input class="form-inp" id="w-kr" placeholder="안녕하세요"></div>
      <div><label class="form-label">베트남어 🇻🇳</label><input class="form-inp" id="w-vn" placeholder="Xin chào"></div>
    </div>
    <div class="form-row"><label class="form-label">발음 (선택)</label><input class="form-inp" id="w-pron" placeholder="씬 짜오"></div>
    <div class="form-row">
      <label class="form-label">카테고리</label>
      <select class="form-sel" id="w-cat">
        <option value="인사">인사</option><option value="일상">일상</option>
        <option value="음식">음식</option><option value="쇼핑">쇼핑</option>
        <option value="병원">병원</option><option value="교통">교통</option>
        <option value="감정">감정</option><option value="가족">가족</option>
        <option value="숫자">숫자</option><option value="날씨">날씨</option>
        <option value="시간">시간</option><option value="직업">직업</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeSheet('wordOverlay')">취소</button>
      <button class="sheet-save" id="wordSaveBtn" onclick="saveWord()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 기본 단어 데이터 (60개)
// ═══════════════════════════════════════════════════════

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='words'){buildCatFil();renderWords();}
  if(id==='quiz') initQuiz();
  if(id==='chat') scrollBot();
}

function setWho(w){
  who=w;
  document.getElementById('chip-me').classList.toggle('active',w==='me');
  document.getElementById('chip-other').classList.toggle('active',w==='other');
  // 닉네임 반영
  document.getElementById('chip-me').textContent = nicks.me;
  document.getElementById('chip-other').textContent = nicks.other;
}

function chatKey(e){
  if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){
    e.preventDefault(); sendMsg();
  }
}
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  msgs.push({id:nid(),who,text,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),trans:null});
  sc(); inp.value=''; inp.style.height='auto';
  renderMsgs(); scrollBot();
}

async function translateMsg(id){
  const m=msgs.find(x=>x.id===id);
  if(!m) return;
  if(m.trans){m.trans=null;sc();renderMsgs();return;}
  m.trans='__loading__'; sc(); renderMsgs();
  try {
    const hasKorean=/[가-힣]/.test(m.text);
    const from=hasKorean?'ko':'vi';
    const to=hasKorean?'vi':'ko';
    // Google Translate 비공식 API (무료, CORS 허용)
    const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(m.text)}`;
    const res=await fetch(url);
    const data=await res.json();
    // 응답 구조: [[["번역결과","원문",...],...]...]
    const translated=data[0]?.map(x=>x[0]).join('')||'';
    m.trans=translated||'번역 결과 없음';
  } catch(e) {
    m.trans='번역할 수 없어요 (네트워크 확인)';
  }
  sc(); renderMsgs();
}

function addWordFromMsg(id){
  const m=msgs.find(x=>x.id===id);
  if(!m) return;
  openAddWord();
  const hasKorean=/[가-힣]/.test(m.text);
  if(hasKorean){ document.getElementById('w-kr').value=m.text; }
  else { document.getElementById('w-vn').value=m.text; }
}

function renderMsgs(){
  const c=document.getElementById('chatMsgs');
  if(!msgs.length){
    c.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:2rem;line-height:1.8">
      안녕하세요! 👋<br>메시지를 보내고 번역 버튼을 눌러보세요<br><small>🔤 번역 · ＋ 단어장 저장</small></div>`;
    return;
  }
  c.innerHTML=msgs.map(m=>{
    const isMe=m.who==='me';
    const nick=isMe?nicks.me:nicks.other;
    const transBtn=m.trans&&m.trans!=='__loading__'
      ?`<button class="mab on" onclick="translateMsg('${m.id}')">번역 숨기기</button>`
      :`<button class="mab" onclick="translateMsg('${m.id}')">🔤 번역</button>`;
    const transDiv=m.trans==='__loading__'
      ?`<div class="trans-bubble trans-loading">번역 중...</div>`
      :m.trans?`<div class="trans-bubble">${esc(m.trans)}</div>`:'';
    return `
    <div class="msg-group ${isMe?'me':'other'}">
      <div class="msg-sender">${esc(nick)}</div>
      <div class="msg-row">
        <div class="bubble">${esc(m.text)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
      ${transDiv}
      <div class="msg-actions">
        ${transBtn}
        <button class="mab" onclick="addWordFromMsg('${m.id}')">＋ 단어장</button>
      </div>
    </div>`;
  }).join('');
}

function scrollBot(){ const c=document.getElementById('chatMsgs'); setTimeout(()=>c.scrollTop=c.scrollHeight,50); }

function buildCatFil(){
  const cats=[...new Set(words.map(w=>w.cat))];
  const sel=document.getElementById('catFilter');
  const cur=sel.value;
  sel.innerHTML='<option value="">전체</option>'+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

function renderWords(){
  const q=(document.getElementById('wordSearch').value||'').toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const f=words.filter(w=>(!cat||w.cat===cat)&&(!q||(w.kr+w.vn+(w.pron||'')).toLowerCase().includes(q)));
  document.getElementById('wordStats').textContent=`전체 ${words.length}개 · 표시 ${f.length}개`;
  const list=document.getElementById('wordList');
  if(!f.length){list.innerHTML='<div class="word-empty">단어가 없어요. + 버튼으로 추가해보세요!</div>';return;}
  list.innerHTML=f.map(w=>`
    <div class="word-card">
      <div class="word-content">
        <div class="word-kr">${esc(w.kr)}</div>
        <div class="word-vn">${esc(w.vn)}</div>
        ${w.pron?`<div class="word-pron">[ ${esc(w.pron)} ]</div>`:''}
        <span class="word-cat">${w.cat}</span>
      </div>
      <div class="word-right">
        <button class="word-del-btn" onclick="editWord(${w.id})" style="color:var(--text2);font-size:13px">✏️</button>
        <button class="word-del-btn" onclick="delWord(${w.id})">✕</button>
      </div>
    </div>`).join('');
}

// 검색창 입력 → 단어장 필터 + API 번역 검색
function onSearchInput(){
  const q=document.getElementById('wordSearch').value.trim();
  document.getElementById('searchClear').style.display=q?'block':'none';
  renderWords();
  clearTimeout(searchTimer);
  const dd=document.getElementById('searchDd');
  if(!q||q.length<2){dd.classList.remove('open');return;}
  dd.innerHTML='<div class="dd-searching">번역 검색 중...</div>';
  dd.classList.add('open');
  searchTimer=setTimeout(()=>doApiSearch(q),600);
}

async function doApiSearch(q){
  const dd=document.getElementById('searchDd');
  try{
    const hasKorean=/[가-힣]/.test(q);
    const from=hasKorean?'ko':'vi';
    const to=hasKorean?'vi':'ko';
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=${from}|${to}`;
    const res=await fetch(url);
    const data=await res.json();
    const trans=data.responseData?.translatedText||'';
    if(!trans){dd.classList.remove('open');return;}
    const kr=hasKorean?q:trans;
    const vn=hasKorean?trans:q;
    const alreadyHave=words.find(w=>w.kr===kr||w.vn===vn);
    dd.innerHTML=`
      <div class="dd-item">
        <div>
          <div class="dd-kr">🇰🇷 ${esc(kr)}</div>
          <div class="dd-vn">🇻🇳 ${esc(vn)}</div>
        </div>
        ${alreadyHave
          ?'<span style="font-size:11px;color:var(--text3)">이미 있음</span>'
          :`<button class="dd-add" onclick="addFromSearch('${esc(kr)}','${esc(vn)}')">+ 추가</button>`}
      </div>`;
    dd.classList.add('open');
  }catch{
    dd.innerHTML='<div class="dd-searching">번역 서버에 연결할 수 없어요</div>';
  }
}

function addFromSearch(kr,vn){
  words.push({id:Date.now(),kr,vn,pron:'',cat:'기타'});
  sw(); buildCatFil(); renderWords();
  document.getElementById('searchDd').classList.remove('open');
  document.getElementById('wordSearch').value='';
  document.getElementById('searchClear').style.display='none';
}

function clearSearch(){
  document.getElementById('wordSearch').value='';
  document.getElementById('searchClear').style.display='none';
  document.getElementById('searchDd').classList.remove('open');
  renderWords();
}

function editWord(id){
  editWId=id;
  const w=words.find(x=>x.id===id);
  document.getElementById('wordSheetTitle').textContent='단어 수정';
  document.getElementById('wordSaveBtn').textContent='수정';
  document.getElementById('w-kr').value=w.kr;
  document.getElementById('w-vn').value=w.vn;
  document.getElementById('w-pron').value=w.pron||'';
  document.getElementById('w-cat').value=w.cat;
  document.getElementById('wordOverlay').classList.add('open');
}

function delWord(id){
  if(!confirm('이 단어를 삭제할까요?')) return;
  words=words.filter(w=>w.id!==id);
  sw(); buildCatFil(); renderWords();
}

  document.getElementById('wordSheetTitle').textContent='단어 추가';

  ['w-kr','w-vn','w-pron'].forEach(i=>document.getElementById(i).value='');

function saveWord(){
  const kr=document.getElementById('w-kr').value.trim();
  const vn=document.getElementById('w-vn').value.trim();
  const pron=document.getElementById('w-pron').value.trim();
  const cat=document.getElementById('w-cat').value;
  if(!kr||!vn){alert('한국어와 베트남어는 필수예요');return;}
  if(editWId){
    const idx=words.findIndex(w=>w.id===editWId);
    if(idx>=0)words[idx]={...words[idx],kr,vn,pron,cat};
  } else {
    words.push({id:Date.now(),kr,vn,pron,cat});
  }
  sw(); buildCatFil(); renderWords();
  closeSheet('wordOverlay');
}

function setQMode(m,el){
  qMode=m;
  document.querySelectorAll('.qmode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function startQuiz(){
  if(qMode==='cat'){
    // 카테고리 선택
    const cats=[...new Set(words.map(w=>w.cat))];
    document.getElementById('quizWrap').innerHTML=`
      <div style="width:100%;max-width:400px;font-size:15px;font-weight:700;margin-bottom:1rem;text-align:center">카테고리 선택</div>
      <div style="width:100%;max-width:400px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${cats.map(c=>`<button style="padding:10px 16px;border-radius:var(--radius-lg);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer" onclick="startCatQuiz('${c}')">${c}</button>`).join('')}
      </div>`;
    return;
  }
  qIdx=0;qScore=0;qTotal=0;qFlipped=false;
  if(qMode==='random') qWords.forEach(w=>w._dir=Math.random()>.5?'kr':'vn');
  renderCard();
}

function startCatQuiz(cat){
  qWords=words.filter(w=>w.cat===cat).sort(()=>Math.random()-.5);
  qIdx=0;qScore=0;qTotal=0;qFlipped=false;qMode='kr2vn';
  renderCard();
}

function renderCard(){
  if(qIdx>=qWords.length){renderResult();return;}
  const w=qWords[qIdx];
  let dir=qMode==='kr2vn'?'kr':qMode==='vn2kr'?'vn':(w._dir||'kr');
  const q=dir==='kr'?w.kr:w.vn;
  const a=dir==='kr'?w.vn:w.kr;
  const qLabel=dir==='kr'?'한국어':'베트남어';
  const aLabel=dir==='kr'?'베트남어':'한국어';
  const showPron=dir==='vn'&&w.pron;
  const pct=Math.round(qIdx/qWords.length*100);
  document.getElementById('quizWrap').innerHTML=`
    <div class="quiz-top" style="width:100%;max-width:400px">
      <span class="quiz-progress-txt">${qIdx+1} / ${qWords.length}</span>
      <span class="quiz-score-txt">✅${qScore} ❌${qTotal-qScore}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="flashcard" onclick="flipCard()" id="fc">
      <div class="card-hint">${qLabel}로 뭐라고 할까요?</div>
      <div class="card-q">${esc(q)}</div>
      ${showPron?`<div class="card-pron">[ ${esc(w.pron)} ]</div>`:''}
      <div class="card-tap" id="ctap">탭해서 정답 확인 →</div>
      <div class="card-ans" id="cans" style="display:none">${esc(a)}</div>
      <div class="card-ans-pron" id="capron" style="display:none">${dir==='kr'&&w.pron?'[ '+esc(w.pron)+' ]':''}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:6px;display:none" id="ccat">${w.cat}</div>
    </div>
    <div id="qbtns" style="display:none;width:100%;max-width:400px">
      <div class="quiz-btns">
        <button class="qbtn wrong" onclick="answerQ(false)">❌ 틀렸어요</button>
        <button class="qbtn correct" onclick="answerQ(true)">✅ 맞았어요</button>
      </div>
    </div>`;
}

function flipCard(){
  document.getElementById('ctap').style.display='none';
  document.getElementById('cans').style.display='block';
  document.getElementById('capron').style.display='block';
  document.getElementById('ccat').style.display='block';
  document.getElementById('qbtns').style.display='block';
  qFlipped=true;
}

function answerQ(correct){
  qTotal++;if(correct)qScore++;
  qIdx++;qFlipped=false;renderCard();
}

function renderResult(){
  const pct=qTotal?Math.round(qScore/qTotal*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':pct>=30?'💪':'📚';
  const msg=pct>=90?'완벽해요!':pct>=70?'잘했어요!':pct>=50?'좋아요!':pct>=30?'더 연습해봐요!':'단어장을 복습해봐요!';
  document.getElementById('quizWrap').innerHTML=`
    <div class="quiz-result">
      <div class="res-emoji">${emoji}</div>
      <div class="res-score">${qScore} / ${qTotal}</div>
      <div style="font-size:28px;font-weight:700;color:var(--primary)">${pct}점</div>
      <div class="res-sub">${msg}</div>
      <div class="res-btns">
        <button class="res-btn" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)" onclick="initQuiz()">다시 하기</button>
        <button class="res-btn" style="background:var(--primary);color:#fff" onclick="showPage('words',document.querySelectorAll('.tab-item')[1])">단어장 보기</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// 공통 유틸
// ═══════════════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }

// 시트 바깥 클릭 닫기
['nickOverlay','wordOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeSheet(id);});
});

// 검색 드롭다운 바깥 클릭
document.addEventListener('click',e=>{
  if(!e.target.closest('.word-search-wrap'))
    document.getElementById('searchDd').classList.remove('open');
});

// ═══════════════════════════════════════════════════════
// 초기 실행
// ═══════════════════════════════════════════════════════
// 칩 닉네임 초기화
document.getElementById('chip-me').textContent=nicks.me;
document.getElementById('chip-other').textContent=nicks.other;
renderMsgs();
scrollBot();
</script>
</body>
</html>
